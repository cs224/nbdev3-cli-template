# Copier template config
_subdirectory: "{{ 'template-operation' if generation_mode == 'operation' else 'template-state' }}"
_templates_suffix: ""
_tasks:
  - command: ["bash", ".copier-ops/bootstrap.sh"]
    when: "{{ generation_mode == 'operation' and _copier_operation == 'copy' }}"
  - command: ["bash", ".copier-ops/run_nbdev_new.sh"]
    when: "{{ generation_mode == 'operation' and _copier_operation == 'copy' }}"
  - command: ["bash", ".copier-ops/apply_overlays.sh"]
    when: "{{ generation_mode == 'operation' and _copier_operation == 'copy' }}"
  - command: ["rm", "-rf", ".copier-ops"]
    when: "{{ _copier_operation == 'copy' }}"

project_name:
  type: str
  help: Project/repo name (kebab-case) and distribution name
  default: hello-cli

package_name:
  type: str
  help: Python package import name (snake_case)
  default: "{{ project_name | replace('-', '_') }}"

cli_name:
  type: str
  help: Console script name (kebab-case)
  default: "{{ project_name }}"

description:
  type: str
  help: Short project description
  default: "Hello-world CLI built with nbdev3 + uv"

author_name:
  type: str
  help: Author name
  default: "Your Name"

author_email:
  type: str
  help: Author email
  default: "you@example.com"

repo_slug:
  type: str
  help: GitHub repo slug (org/repo)
  default: "your-org/{{ project_name }}"

min_python:
  type: str
  help: Minimum supported Python version
  default: "3.12"

generation_mode:
  type: str
  help: Project generation strategy
  choices:
    - state
    - operation
  default: state

nbdev_version:
  type: str
  help: nbdev version used by operation mode bootstrap
  default: "3.0.12"
  when: "{{ generation_mode == 'operation' }}"
